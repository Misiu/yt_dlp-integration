name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v7
      - name: Validate tag against manifest
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="$(python scripts/validate_release.py "$TAG_NAME")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          version_without_build="${version%%+*}"
          if [[ "$version_without_build" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  validation:
    uses: ./.github/workflows/validate.yml

  release:
    needs:
      - validate-version
      - validation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.validate-version.outputs.prerelease }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.validate-version.outputs.version }}
        run: |
          if gh release view "$TAG_NAME" --repo "$REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists; nothing to do."
            exit 0
          fi

          args=(
            release create "$TAG_NAME"
            --repo "$REPOSITORY"
            --verify-tag
            --generate-notes
            --title "YouTube Audio Downloader $VERSION"
          )
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          else
            args+=(--latest)
          fi
          gh "${args[@]}"
